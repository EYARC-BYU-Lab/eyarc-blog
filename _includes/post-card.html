{% assign p = include.post %}
<div class="card" data-tags="{{ p.tags | join: '|' | downcase }}">
  <div class="card-header">
    <div class="card-subtitle text-gray">
      <span class="blog-date"><i class="fa fa-calendar"></i> {{ p.date | date: "%B %-d, %Y" }}</span>
    </div>
    <div class="card-title">
      <h5><a href="{{ p.url | relative_url }}">{{ p.title }}</a></h5>
    </div>
  </div>
  <div class="card-body">
    {{ p.excerpt | strip_html | truncatewords: 40 }}
  </div>
  {% if p.tags.size > 0 %}
  <div class="card-footer">
    {% for tag in p.tags %}
    <span class="label label-rounded label-secondary">{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}
</div>
